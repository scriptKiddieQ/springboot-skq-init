    context-path: /api
    # cookie 30 ???
    session:
      cookie:
        max-age: 2592000
  #MyBatis Plus ??
mybatis-plus:
  configuration:
    # MyBatis ??
    map-underscore-to-camel-case: false
    # ??????????
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  # ????
  global-config:
    db-config:
      logic-delete-field: isDelete
      logic-delete-value: 1 # ?????
      logic-not-delete-value: 0
    enable-sql-runner: true
